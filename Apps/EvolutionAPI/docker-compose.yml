name: evolution-api
services:
  evolution-api:
    image: evoapicloud/evolution-api:latest
    deploy:
      resources:
        reservations:
          memory: 256M
    networks:
      - evolution-net
    ports:
      - target: 8080
        published: "8080"
        protocol: tcp
    restart: always
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=mude-me
      - LOG_LEVEL=ERROR
      - DEL_INSTANCE=false
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://casaos:casaos@localhost:5432/casaos
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - DATABASE_SAVE_DATA_LABELS=true
      - DATABASE_SAVE_DATA_HISTORIC=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://localhost:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=false
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/instances
        target: /evolution/instances
    x-casaos:
      envs:
        - container: SERVER_URL
          description:
            en_us: "Server URL for the Evolution API"
        - container: AUTHENTICATION_API_KEY
          description:
            en_us: "API authentication key (change this!)"
        - container: LOG_LEVEL
          description:
            en_us: "Log level: ERROR, WARN, DEBUG, LOG"
        - container: DATABASE_PROVIDER
          description:
            en_us: "Database provider (postgresql or mongodb)"
        - container: DATABASE_CONNECTION_URI
          description:
            en_us: "Database connection string (leave empty to use local SQLite)"
        - container: CACHE_REDIS_ENABLED
          description:
            en_us: "Enable Redis cache (true/false)"
        - container: CACHE_REDIS_URI
          description:
            en_us: "Redis connection URI"
        - container: CACHE_REDIS_PREFIX_KEY
          description:
            en_us: "Redis key prefix"
      ports:
        - container: "8080"
          description:
            en_us: "Evolution API HTTP Port"
      volumes:
        - container: /evolution/instances
          description:
            en_us: "Evolution API instances data"
    container_name: evolution-api
x-casaos:
  architectures:
    - amd64
    - arm64
  main: evolution-api
  author: johanpedro
  category: Communication
  description:
    en_us: Evolution API is a powerful REST API for WhatsApp integration. It allows you to create and manage WhatsApp instances, send and receive messages, manage groups, and much more through a simple HTTP interface.
    pt_br: Evolution API é uma poderosa API REST para integração com WhatsApp. Permite criar e gerenciar instâncias do WhatsApp, enviar e receber mensagens, gerenciar grupos e muito mais através de uma interface HTTP simples.
  developer: AtendAI / EvolutionAPI
  icon: https://cdn.jsdelivr.net/gh/johanpedroo/CasaOS-AppStore@main/Apps/EvolutionAPI/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/johanpedroo/CasaOS-AppStore@main/Apps/EvolutionAPI/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/johanpedroo/CasaOS-AppStore@main/Apps/EvolutionAPI/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/johanpedroo/CasaOS-AppStore@main/Apps/EvolutionAPI/screenshot-3.png
  tagline:
    en_us: REST API for WhatsApp multi-device integration
    pt_br: API REST para integração multi-dispositivo com WhatsApp
  thumbnail: https://cdn.jsdelivr.net/gh/johanpedroo/CasaOS-AppStore@main/Apps/EvolutionAPI/thumbnail.png
  tips:
    before_install:
      en_us: |
        ⚠️ After installation, change the AUTHENTICATION_API_KEY environment variable to a strong, unique key.
        The API will be available at http://your-casaos-ip:8080.
      pt_br: |
        ⚠️ Após a instalação, altere a variável de ambiente AUTHENTICATION_API_KEY para uma chave forte e única.
        A API estará disponível em http://seu-ip-casaos:8080.
  title:
    en_us: Evolution API
    pt_br: Evolution API
  index: /
  port_map: "8080"
